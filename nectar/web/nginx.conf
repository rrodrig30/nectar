# Served by nginx-unprivileged (listens on 8080, non-root). Serves the static SPA and proxies
# /api/* to the NECTAR API container on the shared network, so the browser makes only same-origin
# requests (the API sets no CORS headers by design) and the frontend uses the same relative `/api`
# base in dev (vite proxy) and prod (this block). The API host/port are the deploy defaults; a
# different deployment overrides them by replacing this file.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Forward /api/* to the API, re-resolving its address at runtime. Podman assigns the API
    # container a new IP on restart; without a resolver nginx caches the address from startup and
    # 502s until the web container is also restarted. Using the podman DNS (the network gateway,
    # 10.89.0.1) with a variable upstream forces per-request resolution, so the web survives an
    # API restart on its own.
    #   /api/recommend -> http://nectar-api:8000/recommend
    location /api/ {
        resolver 10.89.0.1 valid=10s ipv6=off;
        set $nectar_api http://nectar-api:8000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $nectar_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # SPA fallback: unknown paths serve index.html so client-side rendering handles the route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

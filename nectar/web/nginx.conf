# Served by nginx-unprivileged (listens on 8080, non-root). Serves the static SPA and proxies
# /api/* to the NECTAR API container on the shared network, so the browser makes only same-origin
# requests (the API sets no CORS headers by design) and the frontend uses the same relative `/api`
# base in dev (vite proxy) and prod (this block). The API host/port are the deploy defaults; a
# different deployment overrides them by replacing this file.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Strip the /api/ prefix and forward to the API (trailing slash on proxy_pass rewrites the path):
    #   /api/recommend -> http://nectar-api:8000/recommend
    location /api/ {
        proxy_pass http://nectar-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # SPA fallback: unknown paths serve index.html so client-side rendering handles the route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Resolve a parsed ingredient quantity to canonical grams.
#
# ILLUSTRATIVE reference densities and portion weights, pending review against USDA FDC
# food_portion (the authoritative per-food gram_weight source, keyed by fdc_id). Keys are matched
# as case-insensitive substrings of the FDC food description; the longest matching key wins.
# `default` applies when nothing matches.
#
#   volume_density_g_per_ml  - g per mL, used to turn a volume unit (cup, tbsp, ...) into grams
#   count_grams              - g per single item, used for a count or unitless quantity ("2 eggs")

volume_density_g_per_ml:
  default: 1.0            # water-like
  water: 1.0
  milk: 1.03
  cream: 1.00
  yogurt: 1.03
  juice: 1.04
  broth: 1.00
  stock: 1.00
  wine: 0.99
  oil: 0.92
  butter: 0.96
  honey: 1.42
  syrup: 1.37
  molasses: 1.40
  flour: 0.53
  sugar: 0.85
  brown sugar: 0.93
  powdered sugar: 0.56
  cornstarch: 0.54
  cocoa: 0.52
  rice: 0.85
  oats: 0.41
  salt: 1.22

count_grams:
  default: 100           # a no-quantity MAIN food ("chicken") is treated as ~one portion (100 g)
  egg white: 33
  egg yolk: 17
  egg: 50
  clove: 3               # garlic clove
  green onion: 15
  onion: 110
  shallot: 40
  garlic: 5
  carrot: 61
  celery: 40             # 1 stalk
  potato: 173
  tomato: 123
  apple: 182
  banana: 118
  lemon: 58
  lime: 67
  orange: 131
  bell pepper: 119
  cucumber: 201
  avocado: 150
  jalapeno: 14
  mushroom: 18
  # Seasonings, leavening, and condiments: the "one unit / to taste" default (~1 tsp in grams) when
  # a line carries no quantity ("salt to taste", "pepper"), so it is not sized as a 100 g main food.
  # Critical for SODIUM safety - without a small salt portion a no-quantity salt would read as 38 g
  # of sodium. Longest-key-wins keeps "bell pepper"/"garlic" (produce) above the spice keys, and bare
  # "pepper" is intentionally omitted so the pepper VEGETABLE is not mis-sized as the spice. Erring
  # toward ~1 tsp (not a pinch) keeps a salty recipe from reading as low-sodium (the unsafe direction
  # for a renal/hypertensive patient). Values are ILLUSTRATIVE, pending dietitian review.
  salt: 6
  black pepper: 2
  white pepper: 2
  peppercorn: 2
  baking soda: 5
  baking powder: 4
  soy sauce: 6
  bouillon: 4
  msg: 5
  garlic powder: 3
  onion powder: 3
  paprika: 2
  cumin: 2
  chili powder: 3
  cayenne: 2
  oregano: 1
  basil: 1
  thyme: 1
  rosemary: 1
  sage: 1
  dill: 1
  parsley: 1             # fresh herb; small default keeps a garnish from spiking vitamin K (warfarin)
  cilantro: 1
  mint: 1
  chives: 1
  cinnamon: 3
  nutmeg: 2
  turmeric: 3
  coriander: 2
  cardamom: 2
  allspice: 2
  vanilla: 4
  yeast: 3
  oil: 5                 # a no-quantity "oil" is a drizzle, not 100 g (energy safety)

# Per-ingredient mass sanity ceiling (grams). A single recipe ingredient resolving above this is a
# quantity-parse artifact (e.g. a noisy line parsing to 750,000 of something -> tens of thousands of
# kg), not real data; the resolver returns 0 g for it so the garbage cannot poison per-serving totals
# or dish-level statistics. ILLUSTRATIVE and tunable: >99.6% of resolved ingredients are <= 5 kg, and
# a single ingredient over 20 kg is implausible for this home-recipe corpus. Pending review.
max_ingredient_mass_g: 20000

# Keyword -> food_class tags. Tags match the food_class names used by the TRANSFORM knowledge
# base in retention.yaml (root_vegetable, leafy_green, starch). Matching is a case-insensitive
# substring match of the keyword against the FDC food description; a food may match several
# keywords and so carry several classes (a potato is both root_vegetable and starch).
food_class:
  potato: [root_vegetable, starch]
  carrot: [root_vegetable]
  beet: [root_vegetable]
  turnip: [root_vegetable]
  parsnip: [root_vegetable]
  spinach: [leafy_green]
  kale: [leafy_green]
  chard: [leafy_green]
  collard: [leafy_green]
  bread: [starch]
  rice: [starch]
  pasta: [starch]
  flour: [starch]
  # Legumes (dried beans/lentils/peas): mineral-dense, water absorbed rather than drained.
  lentil: [legume]
  bean: [legume]
  chickpea: [legume]
  split pea: [legume]
  black-eyed pea: [legume]
  soybean: [legume]
  # Other vegetables commonly boiled/steamed, so their minerals leach into the medium.
  onion: [other_vegetable]
  celery: [other_vegetable]
  tomato: [other_vegetable]
  broccoli: [other_vegetable]
  cauliflower: [other_vegetable]
  cabbage: [other_vegetable]
  mushroom: [other_vegetable]
  zucchini: [other_vegetable]
  asparagus: [other_vegetable]
  green bean: [other_vegetable]
  corn: [other_vegetable, starch]

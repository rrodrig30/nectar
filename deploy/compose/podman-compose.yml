# Development only. Single Neo4j user, no TLS, no RBAC split.
# Production uses the Quadlet units in ../quadlet with Enterprise RBAC.
version: "3.9"
services:
  neo4j:
    image: docker.io/library/neo4j:5-enterprise
    environment:
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=eval
      - NEO4J_AUTH=neo4j/devpassword
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4j-data:/data"]

  ollama:
    image: docker.io/ollama/ollama:latest
    devices: ["nvidia.com/gpu=all"]
    volumes: ["ollama-models:/root/.ollama"]

  nectar-api:
    image: localhost/nectar-api:latest
    build: { context: .., dockerfile: nectar/Containerfile }
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=devpassword
      - LLM_BACKEND=ollama
      - LLM_BASE_URL=http://ollama:11434
    depends_on: [neo4j, ollama]
    ports: ["8000:8000"]

  nectar-web:
    image: localhost/nectar-web:latest
    build: { context: .., dockerfile: nectar/web/Containerfile }
    ports: ["8080:8080"]

  nutriscrape:
    image: localhost/nutriscrape:latest
    build: { context: .., dockerfile: nutriscrape/Containerfile }
    profiles: ["batch"]
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=devpassword
      - LLM_BACKEND=ollama
      - LLM_BASE_URL=http://ollama:11434
      # Empty by default so the bundled sample corpus / API-less path is used out of the box;
      # set these on the host to point at a real corpus and the FDC bulk export.
      - NUTRISCRAPE_CORPUS=${NUTRISCRAPE_CORPUS:-}
      - FDC_BULK_DIR=${FDC_BULK_DIR:-}
      - FDC_API_KEY=${FDC_API_KEY:-}
      - NUTRISCRAPE_MAX_PARALLEL=${NUTRISCRAPE_MAX_PARALLEL:-4}
    # run a stage with e.g.: podman compose run --rm nutriscrape flow
    volumes: ["corpus-staging:/data", "fdc-staging:/fdc"]
    depends_on: [neo4j]

volumes:
  neo4j-data:
  ollama-models:
  corpus-staging:
  fdc-staging:
